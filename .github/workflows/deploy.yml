name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            cd /www/wwwroot/masterfut.site

            git config --global --add safe.directory /www/wwwroot/masterfut.site

            git pull origin main

            composer install --no-interaction --prefer-dist --optimize-autoloader

            npm ci
            npm run build

            php artisan migrate --force

            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            chown -R www:www /www/wwwroot/masterfut.site
            chmod -R 775 storage bootstrap/cache
            find public/build -type d -exec chmod 755 {} \;
            find public/build -type f -exec chmod 644 {} \;
